name: Update Netflix Releases
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
jobs:
  update-netflix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Netflix fetch
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python fetch_netflix.py
      - name: Commit updated netflix.json and hbo.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase
          git stash pop
          git add netflix.json hbo.json prime.json appletv.json
          git diff --cached --quiet || git commit -m "chore: update netflix + hbo releases $(date -u +'%Y-%m-%d')"
          git push
