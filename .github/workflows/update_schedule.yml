name: Update Soccer Schedule

on:
  # Run every 4 hours
  schedule:
    - cron: '0 */4 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run fetch script
        run: python fetch_schedule.py

      - name: Commit updated schedule.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --cached --quiet || git commit -m "chore: update schedule $(date -u +'%Y-%m-%d')"
          git push
