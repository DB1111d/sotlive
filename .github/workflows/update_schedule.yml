name: Update Schedule
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run soccer fetch
        run: python fetch_schedule.py
      - name: Run NCAA basketball fetch
        run: python fetch_ncaa_basketball.py
      - name: Commit updated schedules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json ncaa_basketball.json
          git diff --cached --quiet || git commit -m "chore: update schedule $(date -u +'%Y-%m-%d')"
          git push
