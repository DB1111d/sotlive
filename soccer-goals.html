<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAL FEED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #eeede9;
    --border: #e0ddd6;
    --accent: #1a6b3c;
    --accent2: #c0392b;
    --text: #111111;
    --muted: #999;
    --mono: 'DM Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'DM Sans', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(245,244,240,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--display);
    font-size: 2rem;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .logo span {
    color: var(--text);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  .live-dot.error { background: var(--accent2); animation: none; }
  .live-dot.loading { background: var(--muted); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

/* ── Main layout ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Match card ── */
  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 2px;
    overflow: hidden;
    animation: slideIn 0.4s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .match-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: nowrap;
    cursor: pointer;
    user-select: none;
  }

  .match-teams {
    font-family: var(--display);
    font-size: 1.5rem;
    letter-spacing: 0.04em;
    line-height: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .match-header:hover {
    background: var(--surface2);
  }

  .match-toggle {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }

  .match-card.collapsed .match-toggle {
    transform: rotate(-90deg);
  }

  .match-goals {
    display: block;
  }

  .match-card.collapsed .match-goals {
    display: none;
  }

  .match-teams {
    font-family: var(--display);
    font-size: 1.5rem;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .match-meta {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── Goal rows ── */
  .goal-row {
    display: grid;
    grid-template-columns: 52px 1fr;
    border-bottom: 1px solid var(--border);
  }

  .goal-row:last-child { border-bottom: none; }

  .goal-minute {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 0 0;
    font-family: var(--display);
    font-size: 1.1rem;
    color: var(--text);
    border-right: 1px solid var(--border);
  }

  .goal-content {
    padding: 16px 20px;
  }

  .goal-title-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .goal-scorer {
    font-family: var(--display);
    font-size: 1.1rem;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .goal-score-badge {
    font-family: var(--mono);
    font-size: 0.68rem;
    background: var(--accent);
    color: #fff;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 500;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  /* ── Goal watch button ── */
  .goal-watch-link {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    color: #fff;
    background: var(--accent);
    text-decoration: none;
    letter-spacing: 0.05em;
    padding: 7px 14px;
    border-radius: 6px;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .goal-watch-link:hover { opacity: 0.85; }
  .goal-watch-link.reddit { background: #ff4500; }

  @media (max-width: 600px) {
    .goal-watch-link {
      font-size: 0.68rem;
      padding: 6px 12px;
    }
  }

  /* ── League filter bar ── */
  #league-filter-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
    margin-left: auto;
    margin-right: auto;
    max-width: 560px;
  }

  .league-btn {
    font-family: var(--mono);
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    flex: 0 1 calc(33.333% - 8px);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  @media (min-width: 601px) {
    #league-filter-bar {
      max-width: 900px;
    }
    .league-btn {
      flex: 0 1 calc(20% - 8px);
    }
  }

  .league-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .league-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Empty / loading states ── */
  #feed-container {
    min-height: 300px;
  }

  .state-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 80px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.8rem;
    text-align: center;
  }

  .state-msg .big {
    font-family: var(--display);
    font-size: 3rem;
    color: var(--border);
    letter-spacing: 0.1em;
  }

  /* ── Last updated bar ── */
  #last-updated {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    text-align: right;
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    header {
      padding: 16px 16px;
    }

    .logo {
      font-size: 1.5rem;
    }

    .status-bar {
      font-size: 0.65rem;
      gap: 8px;
    }

    main {
      padding: 24px 12px 60px;
    }

    #last-updated {
      font-size: 0.62rem;
      margin-bottom: 16px;
    }

    .match-header {
      padding: 14px 16px;
    }

    .match-teams {
      font-size: 1.15rem;
    }

    .goal-row {
      grid-template-columns: 40px 1fr;
    }

    .goal-minute {
      font-size: 0.95rem;
      padding: 14px 0 0;
    }

    .goal-content {
      padding: 12px 14px;
    }

    .goal-scorer {
      font-size: 0.95rem;
    }

    .goal-score-badge {
      font-size: 0.62rem;
      padding: 2px 5px;
    }

    .goal-title-line {
      margin-bottom: 8px;
      gap: 8px;
    }

    .state-msg .big {
      font-size: 2.2rem;
    }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);line-height:1;">
    <span style="font-family:var(--body);font-size:1.3rem;font-weight:500;">← 📺 SOTLive</span>
  </a>
  <div id="last-updated" style="font-family:var(--mono);font-size:0.68rem;color:var(--muted);letter-spacing:0.05em;"></div>
</header>

<main>
  <div style="text-align:center;margin-bottom:16px;margin-top:10px;">
    <span style="font-family:var(--display);font-size:3.2rem;letter-spacing:0.05em;color:var(--accent);"><span style="font-size:3.8rem;">🥅</span> GOAL<span style="color:var(--text);">FEED</span></span>
  </div>
  <div id="league-filter-bar" style="display:none;"></div>
  <div id="feed-container">
    <div class="state-msg">
      <div class="big">⚽</div>
      <div>Fetching latest goals...</div>
    </div>
  </div>
</main>

<script>
// ── Config ──────────────────────────────────────────────
const POLL_MS = 15 * 60 * 1000;

const LEAGUE_ORDER = [
  'UEFA Champions League', 'UEFA Europa League', 'UEFA Europa Conference League',
  'Premier League', 'MLS', 'CONCACAF Champions Cup', 'US Open Cup',
  'English FA Cup', 'EFL Championship', 'Serie A', 'German Bundesliga', 'La Liga',
];

// ── State ───────────────────────────────────────────────
let matches = {};
let activeLeague = '';

// ── Fetch goals.json ────────────────────────────────────
async function fetchGoals() {
  try {
    const res = await fetch('goals.json?v=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Reset and reload all matches fresh each poll
    matches = {};
    for (const match of data.matches || []) {
      const key = matchKey(match.home, match.away);
      matches[key] = match;
    }

    render();
    const updated = data.updated
      ? new Date(data.updated).toLocaleTimeString()
      : new Date().toLocaleTimeString();
    document.getElementById('last-updated').textContent = `LAST UPDATED  ${updated}`;
  } catch (err) {
    console.error(err);
  }
}

// ── Match key ────────────────────────────────────────────
function matchKey(home, away) {
  return [home.toLowerCase(), away.toLowerCase()].sort().join(' vs ');
}

// ── League filter bar ─────────────────────────────────────
function buildLeagueFilter(matchList) {
  const bar = document.getElementById('league-filter-bar');
  if (!bar) return;

  // Leagues present in data, ordered by LEAGUE_ORDER, Other always last
  const present = new Set(matchList.map(m => m.league).filter(Boolean));
  const ordered = LEAGUE_ORDER.filter(l => present.has(l));
  const hasOther = matchList.some(m => !m.league || !LEAGUE_ORDER.includes(m.league) || m.league === 'Other');

  // No buttons at all — hide bar
  if (ordered.length === 0 && !hasOther) {
    bar.style.display = 'none';
    activeLeague = '';
    return;
  }

  // Auto-select on first load — first known league, or Other if none
  if (!activeLeague || (!ordered.includes(activeLeague) && !(hasOther && activeLeague === 'Other'))) {
    activeLeague = ordered.length > 0 ? ordered[0] : 'Other';
  }

  bar.style.display = 'flex';
  bar.innerHTML = '';

  // Known leagues in LEAGUE_ORDER order
  ordered.forEach(league => {
    const btn = document.createElement('button');
    btn.className = 'league-btn' + (activeLeague === league ? ' active' : '');
    btn.textContent = league;
    btn.onclick = () => { activeLeague = league; render(); };
    bar.appendChild(btn);
  });

  // Other always last
  if (hasOther) {
    const otherBtn = document.createElement('button');
    otherBtn.className = 'league-btn' + (activeLeague === 'Other' ? ' active' : '');
    otherBtn.textContent = 'Other';
    otherBtn.onclick = () => { activeLeague = 'Other'; render(); };
    bar.appendChild(otherBtn);
  }
}

// ── Render ────────────────────────────────────────────────
function render() {
  const container = document.getElementById('feed-container');

  let matchList = Object.values(matches);
  if (matchList.length === 0) {
    container.innerHTML = `
      <div class="state-msg">
        <div class="big">⚽</div>
        <div>No goals found yet — check back soon</div>
      </div>`;
    const bar = document.getElementById('league-filter-bar');
    if (bar) bar.style.display = 'none';
    return;
  }

  matchList.sort((a, b) => {
    const latestA = Math.max(...a.goals.map(g => g.postedAt));
    const latestB = Math.max(...b.goals.map(g => g.postedAt));
    return latestB - latestA;
  });

  buildLeagueFilter(matchList);

  // Apply league filter — "Other" shows anything not in LEAGUE_ORDER
  const filtered = activeLeague === 'Other'
    ? matchList.filter(m => !m.league || !LEAGUE_ORDER.includes(m.league) || m.league === 'Other')
    : matchList.filter(m => m.league === activeLeague);

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="state-msg">
        <div class="big">⚽</div>
        <div>No goals for this league yet</div>
      </div>`;
    return;
  }

  // Always collapsed by default — user must click to expand
  const expandedKeys = new Set();
  document.querySelectorAll('.match-card:not(.collapsed)').forEach(card => {
    expandedKeys.add(card.dataset.key);
  });

  container.innerHTML = filtered.map((match) => {
    const key = matchKey(match.home, match.away);
    return renderMatch(match, key, !expandedKeys.has(key));
  }).join('');
}

function renderMatch(match, key, isCollapsed) {
  const collapsed = isCollapsed ? 'collapsed' : '';
  const goalRows = match.goals.map(g => `
    <div class="goal-row">
      <div class="goal-minute">${g.minute != null ? g.minute + "'" : "null'"}</div>
      <div class="goal-content">
        <div class="goal-title-line">
          <span class="goal-scorer">${escHtml(g.scorer)}</span>
          <span class="goal-score-badge">${g.homeScore}–${g.awayScore}</span>
          ${g.disallowed ? '<span style="color:#c0392b;font-size:0.85rem;font-weight:700;">❌ Disallowed</span>' : ''}
        </div>
        ${renderVideo(g)}
      </div>
    </div>
  `).join('');

  return `
    <div class="match-card ${collapsed}" data-key="${escHtml(key)}">
      <div class="match-header" onclick="this.closest('.match-card').classList.toggle('collapsed')">
        <div class="match-teams">${escHtml(match.home)} <span style="color:var(--muted)">vs</span> ${escHtml(match.away)}</div>
        <span class="match-toggle">▼</span>
      </div>
      <div class="match-goals">
        ${goalRows}
      </div>
    </div>
  `;
}

const HOST_COLORS = {
  'streamff.link':   '#2c3e50',
  'streamff.com':    '#2c3e50',
  'streamable.com':  '#457b9d',
  'youtu.be':        '#cc0000',
  'youtube.com':     '#cc0000',
  'streamain.com':   '#6a0dad',
  'streamin.link':   '#2a9d8f',
  'streamin.top':    '#2a9d8f',
  'streamin.me':     '#2a9d8f',
};

function renderVideo(goal) {
  const videoUrl = goal.videoUrl || '';
  if (!videoUrl) return '';

  const isRedditVideo = /v\.redd\.it/.test(videoUrl);
  if (isRedditVideo) {
    return `<a href="${escHtml(goal.permalink)}" target="_blank" rel="noopener" class="goal-watch-link reddit">\u25b6 Watch on Reddit</a>`;
  }

  let host = '';
  try { host = new URL(videoUrl).hostname.replace('www.', ''); } catch(e) {}
  const color = HOST_COLORS[host] || 'var(--accent)';
  return `<a href="${escHtml(videoUrl)}" target="_blank" rel="noopener" class="goal-watch-link" style="background:${color};">\u25b6 Watch on ${host}</a>`;
}

// ── Status indicator ──────────────────────────────────────

// ── Utils ─────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Boot ──────────────────────────────────────────────────
fetchGoals();
setInterval(fetchGoals, POLL_MS);
</script>
</body>
</html>
